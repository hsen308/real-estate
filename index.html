<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELMNINI Homes — Instagram Post Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800;900&family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --navy: #05101f;
    --navy2: #091829;
    --navy3: #0d2240;
    --gold: #c9a84c;
    --gold2: #e8c96a;
    --gold3: #f0d98a;
    --white: #ffffff;
    --offwhite: #f5f0e8;
    --slate: #8a9bb5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #04090f;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 10% 20%, rgba(201,168,76,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 90% 80%, rgba(9,24,41,0.8) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: relative;
    z-index: 10;
    padding: 48px 60px 36px;
    border-bottom: 1px solid rgba(201,168,76,0.15);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, rgba(5,16,31,0.95) 0%, transparent 100%);
  }

  .header-left {}

  .logo-mark {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 8px;
  }

  .logo-icon {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    color: var(--white);
  }

  .logo-text span { color: var(--gold); }

  .header-subtitle {
    font-size: 12px;
    color: var(--slate);
    letter-spacing: 3px;
    text-transform: uppercase;
    padding-left: 64px;
  }

  .header-actions {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .btn {
    padding: 14px 28px;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.1);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .btn:hover::after { opacity: 1; }

  .btn-gold {
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: var(--navy);
  }

  .btn-outline {
    background: transparent;
    color: var(--gold);
    border: 1.5px solid var(--gold);
  }

  .btn-outline:hover {
    background: rgba(201,168,76,0.08);
  }

  /* STATS BAR */
  .stats-bar {
    position: relative;
    z-index: 10;
    display: flex;
    gap: 0;
    padding: 20px 60px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .stat-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-right: 40px;
    margin-right: 40px;
    border-right: 1px solid rgba(255,255,255,0.07);
  }

  .stat-item:last-child { border-right: none; }

  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--gold);
    line-height: 1;
  }

  .stat-label {
    font-size: 11px;
    color: var(--slate);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    line-height: 1.4;
  }

  /* FILTER TABS */
  .filter-section {
    position: relative;
    z-index: 10;
    padding: 32px 60px 0;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-tab {
    padding: 10px 22px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: 1.5px solid rgba(201,168,76,0.25);
    color: var(--slate);
    background: transparent;
    transition: all 0.25s ease;
  }

  .filter-tab:hover, .filter-tab.active {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(201,168,76,0.06);
  }

  /* GRID */
  .grid-section {
    position: relative;
    z-index: 10;
    padding: 40px 60px 80px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 28px;
  }

  /* CARD */
  .post-card {
    background: rgba(9,24,41,0.7);
    border: 1px solid rgba(201,168,76,0.12);
    border-radius: 12px;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    cursor: pointer;
    backdrop-filter: blur(10px);
  }

  .post-card:hover {
    transform: translateY(-8px) scale(1.01);
    border-color: rgba(201,168,76,0.4);
    box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,168,76,0.2), 0 0 40px rgba(201,168,76,0.06);
  }

  .post-preview-wrap {
    position: relative;
    width: 100%;
    padding-top: 100%; /* 1:1 */
    overflow: hidden;
    background: var(--navy);
  }

  .post-preview {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    /* The actual 1080x1080 content scaled down */
  }

  /* The inner 1080x1080 design, scaled to fit */
  .post-design {
    position: absolute;
    width: 1080px;
    height: 1080px;
    top: 0;
    left: 0;
    transform-origin: top left;
    /* transform set by JS */
    pointer-events: none;
  }

  .card-meta {
    padding: 18px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid rgba(201,168,76,0.1);
  }

  .card-info {}

  .card-category {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 4px;
  }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--white);
    line-height: 1.3;
    max-width: 200px;
  }

  .download-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s ease;
    flex-shrink: 0;
  }

  .download-btn:hover {
    transform: scale(1.12);
    box-shadow: 0 0 20px rgba(201,168,76,0.5);
  }

  .download-btn svg { width: 18px; height: 18px; }

  /* Loading overlay */
  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(4,9,15,0.92);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 24px;
    backdrop-filter: blur(8px);
  }

  .loading-overlay.show { display: flex; }

  .loading-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 4px;
    color: var(--gold);
  }

  .loading-bar-wrap {
    width: 300px;
    height: 3px;
    background: rgba(201,168,76,0.15);
    border-radius: 2px;
    overflow: hidden;
  }

  .loading-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold2));
    border-radius: 2px;
    animation: loadingPulse 1.5s ease-in-out infinite;
  }

  @keyframes loadingPulse {
    0% { width: 0%; }
    50% { width: 70%; }
    100% { width: 100%; }
  }

  /* ===== POST DESIGN STYLES ===== */
  /* These styles apply to the 1080x1080 post designs */

  .pd { /* post design base */
    width: 1080px;
    height: 1080px;
    position: absolute;
    top: 0;
    left: 0;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    display: flex;
    flex-direction: column;
    transform-origin: top left;
  }

  /* BUYER POSTS */
  .pd-buyer {
    background: linear-gradient(145deg, #05101f 0%, #091829 40%, #0a1e35 100%);
  }

  .pd-buyer::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 85% 15%, rgba(201,168,76,0.12) 0%, transparent 55%),
      radial-gradient(ellipse 50% 40% at 20% 80%, rgba(13,34,64,0.9) 0%, transparent 50%);
  }

  /* SELLER POSTS */
  .pd-seller {
    background: linear-gradient(160deg, #06121f 0%, #0b1e35 50%, #071525 100%);
  }

  .pd-seller::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 15% 20%, rgba(201,168,76,0.1) 0%, transparent 55%),
      radial-gradient(ellipse 60% 50% at 80% 85%, rgba(13,34,64,0.8) 0%, transparent 60%);
  }

  /* INVESTMENT POSTS */
  .pd-invest {
    background: linear-gradient(135deg, #04111e 0%, #0c1e34 50%, #071828 100%);
  }

  .pd-invest::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 90% 60% at 80% 10%, rgba(201,168,76,0.14) 0%, transparent 50%),
      radial-gradient(ellipse 60% 50% at 10% 90%, rgba(5,16,31,0.9) 0%, transparent 50%);
  }

  /* MARKET POSTS */
  .pd-market {
    background: linear-gradient(150deg, #030d1a 0%, #0d2240 50%, #081728 100%);
  }

  .pd-market::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 15%, rgba(201,168,76,0.1) 0%, transparent 55%),
      radial-gradient(ellipse 70% 50% at 90% 90%, rgba(13,34,64,0.8) 0%, transparent 50%);
  }

  /* ENGAGEMENT POSTS */
  .pd-engage {
    background: linear-gradient(155deg, #060f1e 0%, #0a1c35 40%, #0c2240 100%);
  }

  .pd-engage::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 100% 60% at 50% 0%, rgba(201,168,76,0.13) 0%, transparent 50%),
      radial-gradient(ellipse 60% 40% at 5% 95%, rgba(4,9,15,0.9) 0%, transparent 50%);
  }

  /* AUTHORITY POSTS */
  .pd-auth {
    background: linear-gradient(140deg, #050f1d 0%, #091827 50%, #0b1e36 100%);
  }

  .pd-auth::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 70% at 90% 20%, rgba(201,168,76,0.12) 0%, transparent 55%),
      radial-gradient(ellipse 50% 40% at 15% 85%, rgba(4,9,15,0.9) 0%, transparent 50%);
  }

  /* Geometric decoration */
  .pd-geo {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  /* Grid lines */
  .pd-gridlines {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
    background-size: 90px 90px;
  }

  /* Corner accents */
  .corner-tl, .corner-br {
    position: absolute;
    width: 120px;
    height: 120px;
    pointer-events: none;
  }

  .corner-tl {
    top: 60px;
    left: 60px;
    border-top: 2px solid rgba(201,168,76,0.4);
    border-left: 2px solid rgba(201,168,76,0.4);
  }

  .corner-br {
    bottom: 116px;
    right: 60px;
    border-bottom: 2px solid rgba(201,168,76,0.4);
    border-right: 2px solid rgba(201,168,76,0.4);
  }

  /* Gold diagonal line */
  .pd-diag {
    position: absolute;
    width: 1px;
    height: 340px;
    background: linear-gradient(180deg, transparent, rgba(201,168,76,0.35), transparent);
    transform: rotate(35deg);
    pointer-events: none;
  }

  /* Category badge */
  .pd-badge {
    position: absolute;
    top: 70px;
    left: 80px;
    display: flex;
    align-items: center;
    gap: 14px;
    z-index: 10;
  }

  .pd-badge-dot {
    width: 10px;
    height: 10px;
    background: var(--gold);
    border-radius: 50%;
    box-shadow: 0 0 12px rgba(201,168,76,0.6);
  }

  .pd-badge-text {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(201,168,76,0.9);
  }

  /* Main content area */
  .pd-content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    padding: 160px 80px 120px;
    z-index: 5;
  }

  .pd-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 200px;
    line-height: 0.8;
    color: rgba(201,168,76,0.06);
    position: absolute;
    right: 60px;
    bottom: 200px;
    letter-spacing: -10px;
    user-select: none;
    pointer-events: none;
  }

  .pd-icon-area {
    width: 80px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 40px;
    position: relative;
  }

  .pd-icon-hex {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    position: relative;
  }

  .pd-icon-hex::after {
    content: '';
    position: absolute;
    inset: 14px;
    background: var(--navy2);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  }

  .pd-eyebrow {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .pd-eyebrow::after {
    content: '';
    flex: 1;
    max-width: 80px;
    height: 1px;
    background: linear-gradient(90deg, var(--gold), transparent);
  }

  .pd-title {
    font-family: 'Playfair Display', serif;
    font-size: 76px;
    font-weight: 800;
    line-height: 1.05;
    color: #ffffff;
    margin-bottom: 40px;
    letter-spacing: -1px;
  }

  .pd-title em {
    color: var(--gold);
    font-style: normal;
  }

  .pd-divider {
    width: 80px;
    height: 3px;
    background: linear-gradient(90deg, var(--gold), rgba(201,168,76,0.2));
    margin-bottom: 44px;
    border-radius: 2px;
  }

  .pd-body {
    font-size: 28px;
    line-height: 1.6;
    color: rgba(255,255,255,0.7);
    max-width: 820px;
  }

  /* List style posts */
  .pd-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  .pd-list li {
    display: flex;
    align-items: flex-start;
    gap: 24px;
    font-size: 30px;
    color: rgba(255,255,255,0.85);
    line-height: 1.4;
  }

  .pd-list-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    color: var(--gold);
    line-height: 1;
    min-width: 38px;
    margin-top: 2px;
  }

  /* Stat style posts */
  .pd-stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    margin-top: 10px;
  }

  .pd-stat-box {
    background: rgba(201,168,76,0.05);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 12px;
    padding: 36px 32px;
  }

  .pd-stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 10px;
  }

  .pd-stat-lbl {
    font-size: 22px;
    color: rgba(255,255,255,0.6);
    line-height: 1.3;
  }

  /* This or that */
  .pd-this-that {
    display: flex;
    gap: 0;
    margin-top: 30px;
    flex: 1;
  }

  .pd-choice {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    position: relative;
  }

  .pd-choice:first-child {
    background: linear-gradient(135deg, rgba(201,168,76,0.12), rgba(201,168,76,0.04));
    border-radius: 16px 0 0 16px;
    border: 1px solid rgba(201,168,76,0.25);
    border-right: none;
  }

  .pd-choice:last-child {
    background: rgba(255,255,255,0.03);
    border-radius: 0 16px 16px 0;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .pd-vs {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 80px;
    height: 80px;
    background: var(--navy);
    border: 2px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    color: var(--gold);
    z-index: 10;
    box-shadow: 0 0 30px rgba(201,168,76,0.3);
  }

  .pd-choice-emoji { font-size: 80px; }
  .pd-choice-label {
    font-family: 'Playfair Display', serif;
    font-size: 38px;
    font-weight: 700;
    color: var(--white);
    text-align: center;
  }

  /* BRANDING FOOTER */
  .pd-footer {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 100px;
    display: flex;
    align-items: center;
    padding: 0 80px;
    background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.5) 100%);
    border-top: 1px solid rgba(201,168,76,0.15);
    z-index: 10;
    justify-content: space-between;
  }

  .pd-footer-brand {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .pd-footer-hex {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  }

  .pd-footer-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 3px;
    color: var(--white);
  }

  .pd-footer-sub {
    font-size: 15px;
    color: var(--slate);
    letter-spacing: 1px;
  }

  .pd-footer-right {
    text-align: right;
  }

  .pd-footer-web {
    font-size: 17px;
    color: var(--gold);
    letter-spacing: 1px;
    margin-bottom: 3px;
  }

  .pd-footer-loc {
    font-size: 14px;
    color: var(--slate);
  }

  /* Gold line separator */
  .pd-gold-line {
    width: 100%;
    height: 4px;
    background: linear-gradient(90deg, var(--gold), rgba(201,168,76,0.2), transparent);
    position: absolute;
    top: 0;
    left: 0;
  }

  /* Decorative circles */
  .pd-circle {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.1);
    pointer-events: none;
  }

  /* Tag style */
  .pd-tag {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 100px;
    padding: 12px 28px;
    font-size: 20px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 1px;
    margin-bottom: 40px;
    width: fit-content;
  }

  /* Quote style */
  .pd-quote {
    font-family: 'Playfair Display', serif;
    font-size: 68px;
    font-weight: 600;
    line-height: 1.15;
    color: var(--white);
    font-style: italic;
    margin-bottom: 40px;
  }

  .pd-quote::before {
    content: '\201C';
    color: var(--gold);
    font-size: 120px;
    line-height: 0;
    vertical-align: -50px;
    margin-right: 8px;
  }

  /* Timeline style */
  .pd-timeline {
    display: flex;
    flex-direction: column;
    gap: 0;
    position: relative;
    padding-left: 50px;
  }

  .pd-timeline::before {
    content: '';
    position: absolute;
    left: 14px;
    top: 16px;
    bottom: 16px;
    width: 2px;
    background: linear-gradient(180deg, var(--gold), rgba(201,168,76,0.1));
  }

  .pd-tl-item {
    display: flex;
    align-items: flex-start;
    gap: 30px;
    padding: 18px 0;
    position: relative;
  }

  .pd-tl-dot {
    position: absolute;
    left: -46px;
    top: 26px;
    width: 14px;
    height: 14px;
    background: var(--gold);
    border-radius: 50%;

function stripEmoji(s) {
  if (!s) return '';
  return String(s).replace(/\p{Extended_Pictographic}/gu, '').replace(/\s+/g, ' ').trim();
}

function buildPostHTML(post) {
  const cc = catColors[post.cat];
  const typeClass = `pd-${post.cat}`;
  let inner = '';

  switch(post.type) {
    case 'list':
      inner = `<ul class="pd-list">
        ${post.items.map((item, i) => `
          <li>
            <span class="pd-list-num">0${i+1}</span>
            <span>${stripEmoji(item)}</span>
          </li>`).join('')}
      </ul>`;
      break;

    case 'timeline':
      inner = `<div class="pd-timeline">
        ${post.steps.map(([step, text]) => `
          <div class="pd-tl-item">
            <div class="pd-tl-dot"></div>
            <div class="pd-tl-step">${stripEmoji(step)}</div>
            <div class="pd-tl-text">${stripEmoji(text)}</div>
          </div>`).join('')}
      </div>`;
      break;

    case 'bars':
      inner = `<div class="pd-bars">
        ${post.bars.map(([label, pct]) => `
          <div class="pd-bar-item">
            <div class="pd-bar-label">
              <span>${stripEmoji(label)}</span>
              <span class="pd-bar-pct">${pct}%</span>
            </div>
            <div class="pd-bar-track"><div class="pd-bar-fill" style="width:${pct}%"></div></div>
          </div>`).join('')}
      </div>`;
      break;

    case 'stats':
      inner = `<div class="pd-stats-grid">
        ${post.stats.map(([val, lbl]) => `
          <div class="pd-stat-box">
            <div class="pd-stat-val">${stripEmoji(val)}</div>
            <div class="pd-stat-lbl">${stripEmoji(lbl)}</div>
          </div>`).join('')}
      </div>`;
      break;

    case 'this-that':
      inner = `<div class="pd-this-that" style="position:relative;flex:1;min-height:400px;">
        <div class="pd-choice">
          <div class="pd-choice-label">${stripEmoji(post.a.label)}</div>
          ${post.bodyA ? `<div style="font-size:22px;color:rgba(255,255,255,0.6);text-align:center;line-height:1.5">${post.bodyA.map(stripEmoji).join('<br>')}</div>` : ''}
        </div>
        <div class="pd-vs">VS</div>
        <div class="pd-choice">
          <div class="pd-choice-label">${stripEmoji(post.b.label)}</div>
          ${post.bodyB ? `<div style="font-size:22px;color:rgba(255,255,255,0.6);text-align:center;line-height:1.5">${post.bodyB.map(stripEmoji).join('<br>')}</div>` : ''}
        </div>
      </div>`;
      break;

    case 'pills-highlight':
      inner = `<div class="pd-highlight">
        <div class="pd-highlight-label">Key Insight</div>
        <div class="pd-highlight-text">${stripEmoji(post.highlight)}</div>
      </div>
      <div class="pd-pills">
        ${post.pills.map(p => `<div class="pd-pill">${stripEmoji(p)}</div>`).join('')}
      </div>`;
      break;

    case 'highlight-body':
      inner = `<div class="pd-highlight">
        <div class="pd-highlight-label">Key Insight</div>
        <div class="pd-highlight-text">${stripEmoji(post.highlight)}</div>
      </div>
      <div class="pd-body">${stripEmoji(post.body).replace(/\n\n/g, '</p><p style="margin-top:20px">').replace(/^/, '<p>').replace(/$/, '</p>')}</div>`;
      break;

    case 'cta':
      inner = `<div class="pd-cta-box">
        <div class="pd-cta-text">${stripEmoji(post.ctaTitle)}</div>
        <div class="pd-cta-sub">${stripEmoji(post.ctaSub)}</div>
      </div>`;
      break;
  }

  const titleLines = post.title.split('\n');

  return `
    <div class="pd ${typeClass}" id="post-design-${post.id}">
      <div class="pd-gold-line"></div>
      <div class="pd-gridlines"></div>

      <!-- Decorative circles -->
      <div class="pd-circle" style="width:500px;height:500px;top:-150px;right:-150px;opacity:0.4;"></div>
      <div class="pd-circle" style="width:300px;height:300px;bottom:80px;left:-100px;opacity:0.3;"></div>

      <!-- Diagonal accent -->
      <div class="pd-diag" style="right:180px;top:100px;opacity:0.5;"></div>

      <!-- Corner accents -->
      <div class="corner-tl"></div>
      <div class="corner-br"></div>

      <!-- Badge -->
      <div class="pd-badge">
        <div class="pd-badge-dot"></div>
        <div class="pd-badge-text">${catColors[post.cat].label}</div>
      </div>

      <!-- Main Content -->
      <div class="pd-content">
        <!-- Icon -->
        <div class="pd-icon-area"><div class="pd-icon-hex"></div></div>

        <!-- Title -->
        <div class="pd-eyebrow">Hussein Elmnini</div>
        <h1 class="pd-title">
          ${titleLines[0]}<br><em>${titleLines[1] || ''}</em>
        </h1>
        <div class="pd-divider"></div>

        <!-- Dynamic Content -->
        ${inner}
      </div>

      <!-- Footer Branding -->
      <div class="pd-footer">
        <div class="pd-footer-brand">
          <div class="pd-footer-hex"></div>
          <div>
            <div class="pd-footer-name">${BRAND.name}</div>
            <div class="pd-footer-sub">Real Estate Advisors</div>
          </div>
        </div>
        <div class="pd-footer-right">
          <div class="pd-footer-web">${BRAND.web}</div>
          <div class="pd-footer-loc">${BRAND.loc}</div>
        </div>
      </div>
    </div>`;
}

  const card = document.createElement('div');
  card.className = 'post-card';
  card.dataset.cat = post.cat;

  const previewWrap = document.createElement('div');
  previewWrap.className = 'post-preview-wrap';

  const previewInner = document.createElement('div');
  previewInner.className = 'post-preview';
  previewInner.innerHTML = buildPostHTML(post);

  previewWrap.appendChild(previewInner);

  const meta = document.createElement('div');
  meta.className = 'card-meta';
  meta.innerHTML = `
    <div class="card-info">
      <div class="card-category">${catColors[post.cat].label}</div>
      <div class="card-title">${post.title.replace('\n', ' ')}</div>
    </div>
    <button class="download-btn" onclick="downloadPost(${post.id})" title="Download PNG">
      <svg viewBox="0 0 24 24" fill="none" stroke="#05101f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    </button>`;

  card.appendChild(previewWrap);
  card.appendChild(meta);

  return card;
}

function scalePostDesigns() {
  const wraps = document.querySelectorAll('.post-preview-wrap');
  wraps.forEach(wrap => {
    const w = wrap.offsetWidth;
    const scale = w / 1080;
    const design = wrap.querySelector('.post-design, .pd');
    if (design) {
      design.style.transform = `scale(${scale})`;
      wrap.style.height = w + 'px';
    }
  });
}

function renderGrid(filter = 'all') {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const filtered = filter === 'all' ? posts : posts.filter(p => p.cat === filter);
  filtered.forEach(post => {
    grid.appendChild(buildCard(post));
  });
  setTimeout(scalePostDesigns, 50);
}

window.addEventListener('resize', scalePostDesigns);

function filterPosts(cat, btn) {
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderGrid(cat);
}

async function downloadPost(id) {
  const overlay = document.getElementById('loadingOverlay');
  overlay.classList.add('show');
  await new Promise(r => setTimeout(r, 100));

  try {
    const design = document.getElementById(`post-design-${id}`);

    // Clone into body to avoid overflow:hidden clipping from parent wrapper
    const clone = design.cloneNode(true);
    clone.style.position = 'fixed';
    clone.style.top = '-9999px';
    clone.style.left = '-9999px';
    clone.style.width = '1080px';
    clone.style.height = '1080px';
    clone.style.transform = 'none';
    clone.style.zIndex = '-1';
    document.body.appendChild(clone);

    const canvas = await html2canvas(clone, {
      width: 1080,
      height: 1080,
      scale: 1,
      useCORS: true,
      backgroundColor: null,
      logging: false
    });

    document.body.removeChild(clone);

    const link = document.createElement('a');
    const post = posts.find(p => p.id === id);
    const safeTitle = post.title.replace(/\n/g, '-').replace(/[^a-z0-9\-]/gi, '').toLowerCase();
    link.download = `elmnini-${safeTitle}-${id}.png`;
    link.href = canvas.toDataURL('image/png', 1.0);
    link.click();
  } catch(e) {
    console.error(e);
    alert('Download failed. Please try again.');
  }

  overlay.classList.remove('show');
}

async function downloadAll() {
  const overlay = document.getElementById('loadingOverlay');
  overlay.classList.add('show');

  for (let i = 0; i < posts.length; i++) {
    const post = posts[i];
    overlay.querySelector('.loading-text').textContent = `DOWNLOADING ${i+1} / ${posts.length}...`;
    await new Promise(r => setTimeout(r, 200));

    try {
      const design = document.getElementById(`post-design-${post.id}`);

      const clone = design.cloneNode(true);
      clone.style.position = 'fixed';
      clone.style.top = '-9999px';
      clone.style.left = '-9999px';
      clone.style.width = '1080px';
      clone.style.height = '1080px';
      clone.style.transform = 'none';
      clone.style.zIndex = '-1';
      document.body.appendChild(clone);

      const canvas = await html2canvas(clone, {
        width: 1080,
        height: 1080,
        scale: 1,
        useCORS: true,
        backgroundColor: null,
        logging: false
      });

      document.body.removeChild(clone);

      const link = document.createElement('a');
      const safeTitle = post.title.replace(/\n/g, '-').replace(/[^a-z0-9\-]/gi, '').toLowerCase();
      link.download = `elmnini-post-${String(post.id).padStart(2,'0')}-${safeTitle}.png`;
      link.href = canvas.toDataURL('image/png', 1.0);
      link.click();

      await new Promise(r => setTimeout(r, 600));
    } catch(e) {
      console.error(`Post ${post.id} failed`, e);
    }
  }

  overlay.querySelector('.loading-text').textContent = 'GENERATING POSTS...';
  overlay.classList.remove('show');
}

function shufflePosts() {
  posts.sort(() => Math.random() - 0.5);
  renderGrid();
}

// Init
renderGrid();
</script>
