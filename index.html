<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELMNINI Homes — Carousel Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root {
    --ink:    #030d18;
    --navy:   #071629;
    --navy2:  #0c2040;
    --gold:   #c8a84b;
    --gold2:  #e6cc7a;
    --gold3:  #f5e4a8;
    --white:  #ffffff;
    --fog:    #a8b8cc;
    --glass:  rgba(12,32,64,0.55);
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #030d18;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── PAGE GRAIN ── */
  body::after {
    content:'';
    position:fixed; inset:0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events:none; z-index:9999; opacity:0.4;
  }

  /* ── HEADER ── */
  header {
    padding: 44px 72px 36px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(200,168,75,0.14);
    position: relative;
  }
  header::after {
    content:'';
    position:absolute; bottom:0; left:72px; right:72px;
    height:1px;
    background: linear-gradient(90deg, var(--gold), rgba(200,168,75,0.1), transparent);
  }

  .brand-lockup { display:flex; align-items:center; gap:20px; }

  .brand-diamond {
    width:52px; height:52px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    transform: rotate(45deg);
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
    box-shadow: 0 0 28px rgba(200,168,75,0.3);
  }
  .brand-diamond span { transform:rotate(-45deg); font-size:22px; }

  .brand-text {}
  .brand-name {
    font-family:'Bebas Neue',sans-serif;
    font-size:26px; letter-spacing:4px; color:var(--white);
    line-height:1;
  }
  .brand-name em { color:var(--gold); font-style:normal; }
  .brand-sub {
    font-size:11px; color:var(--fog);
    letter-spacing:3px; text-transform:uppercase;
    margin-top:4px;
  }

  .header-actions { display:flex; gap:14px; align-items:center; }

  .btn {
    padding:13px 28px;
    border-radius:3px;
    font-family:'DM Sans',sans-serif;
    font-size:12px; font-weight:700;
    letter-spacing:2px; text-transform:uppercase;
    cursor:pointer; border:none; transition:all .28s ease;
    position:relative; overflow:hidden;
  }
  .btn-gold {
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: var(--navy);
  }
  .btn-gold:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(200,168,75,0.4); }

  .btn-outline {
    background:transparent;
    border:1.5px solid rgba(200,168,75,0.45);
    color:var(--gold);
  }
  .btn-outline:hover {
    background:rgba(200,168,75,0.07);
    border-color:var(--gold);
  }

  /* ── INFO BAR ── */
  .info-bar {
    display:flex; align-items:center;
    padding:22px 72px;
    border-bottom:1px solid rgba(255,255,255,0.04);
    gap:48px;
  }
  .info-item { display:flex; align-items:center; gap:10px; }
  .info-dot { width:8px;height:8px;background:var(--gold);border-radius:50%;box-shadow:0 0 10px rgba(200,168,75,0.6); }
  .info-text { font-size:12px; color:var(--fog); letter-spacing:1.5px; text-transform:uppercase; }
  .info-text strong { color:var(--white); font-weight:600; }

  /* ── SLIDE GRID ── */
  .slides-section {
    padding:52px 72px 80px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:32px;
  }

  .slide-card {
    background: rgba(12,32,64,0.4);
    border:1px solid rgba(200,168,75,0.1);
    border-radius:14px;
    overflow:hidden;
    transition:all .4s cubic-bezier(0.16,1,0.3,1);
    cursor:default;
  }
  .slide-card:hover {
    transform:translateY(-10px) scale(1.015);
    border-color:rgba(200,168,75,0.45);
    box-shadow:0 28px 70px rgba(0,0,0,0.6), 0 0 0 1px rgba(200,168,75,0.15),
               0 0 50px rgba(200,168,75,0.07);
  }

  .slide-number-tag {
    padding:10px 18px;
    display:flex; align-items:center; gap:10px;
    border-bottom:1px solid rgba(200,168,75,0.08);
  }
  .sn-badge {
    font-family:'Bebas Neue',sans-serif;
    font-size:13px; letter-spacing:3px; color:var(--gold);
    background:rgba(200,168,75,0.08);
    border:1px solid rgba(200,168,75,0.2);
    border-radius:100px; padding:3px 14px;
  }
  .sn-label { font-size:11px; color:var(--fog); letter-spacing:1px; text-transform:uppercase; }

  /* ── SLIDE PREVIEW WRAPPER (1:1 ratio) ── */
  .slide-preview-wrap {
    width:100%;
    padding-top:100%;
    position:relative;
    overflow:hidden;
    background:var(--ink);
  }
  .slide-preview-inner {
    position:absolute; inset:0;
    display:flex;
  }

  /* ── CARD FOOTER ── */
  .slide-footer {
    padding:16px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-top:1px solid rgba(200,168,75,0.08);
  }
  .slide-footer-title {
    font-size:12px; font-weight:600;
    color:var(--white);
    line-height:1.3;
    max-width:180px;
  }
  .dl-btn {
    width:38px;height:38px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--gold),var(--gold2));
    border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:all .25s ease; flex-shrink:0;
  }
  .dl-btn:hover { transform:scale(1.15); box-shadow:0 0 20px rgba(200,168,75,0.55); }
  .dl-btn svg { width:16px;height:16px; }

  /* ── LOADING OVERLAY ── */
  .overlay {
    display:none; position:fixed; inset:0;
    background:rgba(3,13,24,0.93);
    z-index:10000; flex-direction:column;
    align-items:center; justify-content:center; gap:22px;
    backdrop-filter:blur(10px);
  }
  .overlay.show { display:flex; }
  .overlay-title {
    font-family:'Bebas Neue',sans-serif;
    font-size:22px; letter-spacing:5px; color:var(--gold);
  }
  .overlay-progress-wrap {
    width:280px; height:3px;
    background:rgba(200,168,75,0.15); border-radius:2px; overflow:hidden;
  }
  .overlay-progress {
    height:100%; background:linear-gradient(90deg,var(--gold),var(--gold2));
    border-radius:2px; transition:width .3s ease;
    width:0%;
  }
  .overlay-sub { font-size:12px; color:var(--fog); letter-spacing:2px; }

  /* ════════════════════════════════════════════
     SLIDE DESIGNS — all 1080×1080, scale via JS
  ════════════════════════════════════════════ */
  .slide-design {
    width:1080px; height:1080px;
    position:absolute; top:0; left:0;
    transform-origin:top left;
    overflow:hidden;
    font-family:'DM Sans',sans-serif;
  }

  /* ── COVER SLIDE ── */
  .cover-slide {
    background: var(--ink);
  }
  .cover-img {
    position:absolute; inset:0;
    background-size:cover; background-position:center;
    filter:brightness(0.45) saturate(0.8);
  }
  .cover-overlay {
    position:absolute; inset:0;
    background:linear-gradient(175deg,
      rgba(3,13,24,0.2) 0%,
      rgba(3,13,24,0.5) 40%,
      rgba(3,13,24,0.92) 80%,
      rgba(3,13,24,0.98) 100%
    );
  }
  .cover-grid-lines {
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(200,168,75,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,168,75,0.04) 1px, transparent 1px);
    background-size:90px 90px;
  }
  .cover-content {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    justify-content:flex-end;
    padding:0 88px 108px;
    z-index:5;
  }
  .cover-eyebrow {
    display:flex; align-items:center; gap:18px;
    margin-bottom:36px;
  }
  .cover-eyebrow-line {
    width:56px; height:2px;
    background:linear-gradient(90deg,var(--gold),rgba(200,168,75,0.2));
  }
  .cover-eyebrow-text {
    font-size:20px; font-weight:700;
    letter-spacing:6px; text-transform:uppercase;
    color:var(--gold);
  }
  .cover-title {
    font-family:'Cormorant Garamond',serif;
    font-size:106px; font-weight:700;
    line-height:0.95; color:var(--white);
    margin-bottom:32px;
    letter-spacing:-2px;
  }
  .cover-title em { color:var(--gold); font-style:normal; }
  .cover-subtitle {
    font-size:26px; color:rgba(255,255,255,0.65);
    font-weight:400; letter-spacing:1px;
    max-width:700px; line-height:1.5;
    margin-bottom:56px;
  }
  .cover-divider {
    width:100%; height:1px;
    background:linear-gradient(90deg,var(--gold),rgba(200,168,75,0.1),transparent);
    margin-bottom:40px;
  }
  .cover-brand-row {
    display:flex; align-items:center; justify-content:space-between;
  }
  .cover-brand-left { display:flex; align-items:center; gap:18px; }
  .cover-brand-hex {
    width:46px; height:46px;
    background:linear-gradient(135deg,var(--gold),var(--gold2));
    clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  }
  .cover-brand-name {
    font-family:'Bebas Neue',sans-serif;
    font-size:28px; letter-spacing:4px; color:var(--white); line-height:1;
  }
  .cover-brand-name span { color:var(--gold); }
  .cover-brand-sub { font-size:14px; color:var(--fog); letter-spacing:1.5px; }
  .cover-brand-right { text-align:right; }
  .cover-brand-web { font-size:18px; color:var(--gold); letter-spacing:1px; }
  .cover-brand-loc { font-size:14px; color:var(--fog); margin-top:4px; }

  .cover-slide-num {
    position:absolute; top:72px; right:88px;
    font-family:'Bebas Neue',sans-serif;
    font-size:22px; letter-spacing:5px; color:rgba(200,168,75,0.4);
    z-index:5;
  }

  .cover-corner-tl, .cover-corner-br {
    position:absolute; width:100px;height:100px; z-index:5;
  }
  .cover-corner-tl { top:60px;left:60px; border-top:2px solid rgba(200,168,75,0.35); border-left:2px solid rgba(200,168,75,0.35); }
  .cover-corner-br { bottom:60px;right:60px; border-bottom:2px solid rgba(200,168,75,0.35); border-right:2px solid rgba(200,168,75,0.35); }

  .cover-gold-bar { position:absolute; top:0;left:0;right:0; height:5px; background:linear-gradient(90deg,var(--gold),var(--gold2),rgba(200,168,75,0.1)); z-index:6; }

  /* ── PROPERTY SLIDES ── */
  .prop-slide {
    background:var(--ink);
  }
  .prop-img {
    position:absolute; inset:0;
    background-size:cover; background-position:center;
    filter:brightness(0.38) saturate(0.75);
    transition:transform 8s ease;
  }
  .prop-overlay {
    position:absolute; inset:0;
    background:linear-gradient(180deg,
      rgba(3,13,24,0.15) 0%,
      rgba(3,13,24,0.3) 30%,
      rgba(3,13,24,0.75) 60%,
      rgba(3,13,24,0.97) 100%
    );
  }
  .prop-overlay2 {
    position:absolute; inset:0;
    background:linear-gradient(90deg,
      rgba(3,13,24,0.6) 0%,
      transparent 60%
    );
  }

  /* Slide number */
  .prop-slide-num {
    position:absolute; top:64px; right:80px;
    font-family:'Bebas Neue',sans-serif;
    font-size:20px; letter-spacing:5px; color:rgba(200,168,75,0.5);
    z-index:10;
  }

  /* Top badge */
  .prop-badge {
    position:absolute; top:64px; left:80px;
    background:rgba(200,168,75,0.12);
    border:1.5px solid rgba(200,168,75,0.4);
    border-radius:100px;
    padding:12px 28px;
    display:flex; align-items:center; gap:10px;
    z-index:10;
  }
  .prop-badge-dot { width:8px;height:8px;background:var(--gold);border-radius:50%; }
  .prop-badge-text { font-size:17px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold); }

  /* Price tag */
  .prop-price-tag {
    position:absolute; left:80px;
    background:linear-gradient(135deg,var(--gold),var(--gold2));
    border-radius:4px 16px 16px 4px;
    padding:20px 40px;
    z-index:10;
  }
  .prop-price {
    font-family:'Bebas Neue',sans-serif;
    font-size:76px; line-height:1; color:var(--navy);
    letter-spacing:1px;
  }
  .prop-price-sub { font-size:18px; font-weight:700; color:rgba(5,22,41,0.7); letter-spacing:2px; margin-top:4px; }

  /* Content bottom area */
  .prop-content-bottom {
    position:absolute; bottom:0; left:0; right:0;
    padding:0 80px 72px;
    z-index:10;
  }

  .prop-location-row {
    display:flex; align-items:center; gap:14px;
    margin-bottom:18px;
  }
  .prop-location-icon { font-size:22px; }
  .prop-location-text {
    font-size:24px; color:rgba(255,255,255,0.75); font-weight:500;
    letter-spacing:0.5px;
  }

  .prop-title {
    font-family:'Cormorant Garamond',serif;
    font-size:68px; font-weight:700; color:var(--white);
    line-height:1.05; letter-spacing:-1px;
    margin-bottom:28px;
  }

  .prop-caption {
    font-size:26px; color:rgba(255,255,255,0.6);
    line-height:1.5; max-width:840px;
    margin-bottom:40px; font-weight:400;
    font-style:italic;
  }

  /* Stats row */
  .prop-stats {
    display:flex; gap:0;
    background:rgba(7,22,41,0.7);
    border:1px solid rgba(200,168,75,0.2);
    border-radius:12px;
    overflow:hidden;
    backdrop-filter:blur(12px);
    margin-bottom:36px;
  }
  .prop-stat {
    flex:1;
    padding:28px 24px;
    display:flex; align-items:center; gap:16px;
    border-right:1px solid rgba(200,168,75,0.12);
    position:relative;
  }
  .prop-stat:last-child { border-right:none; }
  .prop-stat-icon { font-size:30px; flex-shrink:0; }
  .prop-stat-info {}
  .prop-stat-val {
    font-family:'Bebas Neue',sans-serif;
    font-size:38px; color:var(--gold); line-height:1;
  }
  .prop-stat-lbl { font-size:18px; color:var(--fog); line-height:1; margin-top:4px; }

  /* Footer branding */
  .prop-footer {
    display:flex; align-items:center; justify-content:space-between;
  }
  .prop-footer-left { display:flex; align-items:center; gap:14px; }
  .prop-footer-hex {
    width:36px;height:36px;
    background:linear-gradient(135deg,var(--gold),var(--gold2));
    clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  }
  .prop-footer-name {
    font-family:'Bebas Neue',sans-serif;
    font-size:22px; letter-spacing:3px; color:var(--white);
  }
  .prop-footer-sub { font-size:14px; color:var(--fog); }
  .prop-footer-right { text-align:right; }
  .prop-footer-web { font-size:16px; color:var(--gold); letter-spacing:0.5px; }
  .prop-footer-loc { font-size:13px; color:var(--fog); }

  /* Gold top bar on prop slides */
  .prop-gold-bar { position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--gold),var(--gold2),rgba(200,168,75,0.1));z-index:10; }
  .prop-corner-tl,.prop-corner-br { position:absolute;width:80px;height:80px;z-index:10; }
  .prop-corner-tl { top:50px;left:50px;border-top:1.5px solid rgba(200,168,75,0.3);border-left:1.5px solid rgba(200,168,75,0.3); }
  .prop-corner-br { bottom:50px;right:50px;border-bottom:1.5px solid rgba(200,168,75,0.3);border-right:1.5px solid rgba(200,168,75,0.3); }

  /* Diagonal deco */
  .deco-line {
    position:absolute; pointer-events:none; z-index:4;
    width:1px; height:280px;
    background:linear-gradient(180deg,transparent,rgba(200,168,75,0.25),transparent);
  }

  /* Swipe hint on cover */
  .swipe-hint {
    position:absolute; bottom:260px; right:88px;
    display:flex; align-items:center; gap:14px;
    z-index:10;
  }
  .swipe-hint-text { font-size:17px; color:rgba(255,255,255,0.4); letter-spacing:2px; }
  .swipe-hint-arrow { font-size:22px; color:var(--gold); opacity:0.6; }

  /* Page progress dots on prop slides */
  .prop-dots {
    position:absolute; bottom:230px; right:80px;
    display:flex; gap:10px; z-index:10; flex-direction:column;
  }
  .prop-dot {
    width:8px;height:8px;
    border-radius:50%;
    background:rgba(200,168,75,0.25);
    border:1.5px solid rgba(200,168,75,0.3);
    transition:all .3s;
  }
  .prop-dot.active {
    background:var(--gold);
    box-shadow:0 0 8px rgba(200,168,75,0.6);
    width:8px;height:28px;
    border-radius:4px;
  }

</style>
</head>
<body>

<!-- LOADING OVERLAY -->
<div class="overlay" id="overlay">
  <div class="overlay-title" id="overlayTitle">EXPORTING SLIDES…</div>
  <div class="overlay-progress-wrap">
    <div class="overlay-progress" id="overlayBar"></div>
  </div>
  <div class="overlay-sub" id="overlaySub">Please wait</div>
</div>

<!-- HEADER -->
<header>
  <div class="brand-lockup">
    <div class="brand-diamond"><span>🏠</span></div>
    <div class="brand-text">
      <div class="brand-name">ELMNINI <em>HOMES</em></div>
      <div class="brand-sub">Instagram Carousel Generator · Toronto</div>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn btn-outline" id="btnZip">⬇ Download Full Carousel (ZIP)</button>
    <button class="btn btn-gold" id="btnAll">↓ Download All 6 Slides</button>
  </div>
</header>

<!-- INFO BAR -->
<div class="info-bar">
  <div class="info-item">
    <div class="info-dot"></div>
    <div class="info-text"><strong>6</strong> Slides Ready</div>
  </div>
  <div class="info-item">
    <div class="info-dot"></div>
    <div class="info-text"><strong>1080 × 1080</strong> px · Instagram Format</div>
  </div>
  <div class="info-item">
    <div class="info-dot"></div>
    <div class="info-text">Topic: <strong>Homes Under $500K in Toronto</strong></div>
  </div>
  <div class="info-item">
    <div class="info-dot"></div>
    <div class="info-text">Agent: <strong>Hussein Elmnini</strong></div>
  </div>
</div>

<!-- SLIDES GRID -->
<div class="slides-section" id="slidesGrid"></div>

<script>
/* ─────────────────────────────────────────────
   DATA
───────────────────────────────────────────── */
const BRAND = {
  name: 'ELMNINI Homes Team',
  web:  'elmninihomes.ca',
  loc:  'Toronto, ON',
  agent:'Hussein Elmnini'
};

// Unsplash real estate images (free to use, no auth required)
const COVER_IMG   = 'https://images.unsplash.com/photo-1560184897-ae75f418493e?w=1080&q=80'; // Toronto skyline / condo
const PROP_IMAGES = [
  'https://images.unsplash.com/photo-1568605114967-8130f3a36994?w=1080&q=80', // suburban house
  'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=1080&q=80', // modern house
  'https://images.unsplash.com/photo-1570129477492-45c003edd2be?w=1080&q=80', // house front
  'https://images.unsplash.com/photo-1599427303058-f04cbcf4756f?w=1080&q=80', // condo building
  'https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?w=1080&q=80', // condo interior/exterior
];

const properties = [
  {
    price:     '$489,000',
    type:      'Studio Condo',
    location:  'Scarborough, Toronto',
    beds:      '1',
    baths:     '1',
    sqft:      '~600 sqft',
    caption:   'Perfect starter condo steps from TTC transit and Scarborough Town Centre.',
    img:       PROP_IMAGES[0],
    idx:       2
  },
  {
    price:     '$499,000',
    type:      'Semi-Detached',
    location:  'Etobicoke, Toronto',
    beds:      '2',
    baths:     '1',
    sqft:      '~850 sqft',
    caption:   'Charming semi-detached with a private backyard in a quiet Etobicoke pocket.',
    img:       PROP_IMAGES[1],
    idx:       3
  },
  {
    price:     '$459,900',
    type:      '1-Bed Condo',
    location:  'North York, Toronto',
    beds:      '1',
    baths:     '1',
    sqft:      '~550 sqft',
    caption:   'Modern finishes, city views, and walking distance to Sheppard subway.',
    img:       PROP_IMAGES[2],
    idx:       4
  },
  {
    price:     '$474,000',
    type:      'Townhouse',
    location:  'East York, Toronto',
    beds:      '2',
    baths:     '2',
    sqft:      '~920 sqft',
    caption:   'Updated townhouse with 2 baths in an up-and-coming East York neighbourhood.',
    img:       PROP_IMAGES[3],
    idx:       5
  },
  {
    price:     '$449,999',
    type:      '1+Den Condo',
    location:  'Downtown Toronto',
    beds:      '1+Den',
    baths:     '1',
    sqft:      '~620 sqft',
    caption:   'Prime downtown location — walkable to everything with stunning skyline views.',
    img:       PROP_IMAGES[4],
    idx:       6
  }
];

/* ─────────────────────────────────────────────
   BUILD SLIDE HTML
───────────────────────────────────────────── */
function buildCoverSlide() {
  return `
  <div class="slide-design cover-slide" id="slide-design-1">
    <div class="cover-gold-bar"></div>
    <div class="cover-img" style="background-image:url('${COVER_IMG}')"></div>
    <div class="cover-overlay"></div>
    <div class="cover-grid-lines"></div>
    <div class="cover-corner-tl"></div>
    <div class="cover-corner-br"></div>
    <div class="cover-slide-num">01 / 06</div>
    <div class="swipe-hint">
      <span class="swipe-hint-text">SWIPE</span>
      <span class="swipe-hint-arrow">→</span>
    </div>
    <div class="cover-content">
      <div class="cover-eyebrow">
        <div class="cover-eyebrow-line"></div>
        <div class="cover-eyebrow-text">Market Spotlight</div>
      </div>
      <h1 class="cover-title">
        Homes Sold<br>Under <em>$500K</em><br>in Toronto
      </h1>
      <p class="cover-subtitle">Real properties from the market — curated by your local expert.</p>
      <div class="cover-divider"></div>
      <div class="cover-brand-row">
        <div class="cover-brand-left">
          <div class="cover-brand-hex"></div>
          <div>
            <div class="cover-brand-name">ELMNINI <span>HOMES</span></div>
            <div class="cover-brand-sub">Real Estate Advisors</div>
          </div>
        </div>
        <div class="cover-brand-right">
          <div class="cover-brand-web">elmninihomes.ca</div>
          <div class="cover-brand-loc">📍 Toronto, Canada</div>
        </div>
      </div>
    </div>
  </div>`;
}

function buildPropSlide(prop) {
  const dots = Array.from({length:5},(_,i)=>{
    const active = i === (prop.idx-2);
    return `<div class="prop-dot ${active?'active':''}"></div>`;
  }).join('');

  return `
  <div class="slide-design prop-slide" id="slide-design-${prop.idx}">
    <div class="prop-gold-bar"></div>
    <div class="prop-img" style="background-image:url('${prop.img}')"></div>
    <div class="prop-overlay"></div>
    <div class="prop-overlay2"></div>
    <div class="prop-corner-tl"></div>
    <div class="prop-corner-br"></div>
    <div class="deco-line" style="right:160px;top:100px;transform:rotate(30deg);"></div>

    <!-- Badge -->
    <div class="prop-badge">
      <div class="prop-badge-dot"></div>
      <div class="prop-badge-text">Just Sold</div>
    </div>

    <!-- Slide number -->
    <div class="prop-slide-num">0${prop.idx} / 06</div>

    <!-- Dots -->
    <div class="prop-dots">${dots}</div>

    <!-- Price tag (positioned mid-way) -->
    <div class="prop-price-tag" style="top:340px;">
      <div class="prop-price">${prop.price}</div>
      <div class="prop-price-sub">${prop.type.toUpperCase()}</div>
    </div>

    <!-- Bottom content -->
    <div class="prop-content-bottom">

      <div class="prop-location-row">
        <span class="prop-location-icon">📍</span>
        <span class="prop-location-text">${prop.location}</span>
      </div>

      <h2 class="prop-title">${prop.type}</h2>
      <p class="prop-caption">${prop.caption}</p>

      <!-- Stats row -->
      <div class="prop-stats">
        <div class="prop-stat">
          <div class="prop-stat-icon">🛏</div>
          <div class="prop-stat-info">
            <div class="prop-stat-val">${prop.beds}</div>
            <div class="prop-stat-lbl">Bed${prop.beds!=='1'?'s':''}</div>
          </div>
        </div>
        <div class="prop-stat">
          <div class="prop-stat-icon">🚿</div>
          <div class="prop-stat-info">
            <div class="prop-stat-val">${prop.baths}</div>
            <div class="prop-stat-lbl">Bath${prop.baths!=='1'?'s':''}</div>
          </div>
        </div>
        <div class="prop-stat">
          <div class="prop-stat-icon">📐</div>
          <div class="prop-stat-info">
            <div class="prop-stat-val">${prop.sqft.replace('~','').replace(' sqft','')}</div>
            <div class="prop-stat-lbl">Sq Ft</div>
          </div>
        </div>
        <div class="prop-stat">
          <div class="prop-stat-icon">🏙️</div>
          <div class="prop-stat-info">
            <div class="prop-stat-val" style="font-size:26px;line-height:1.1;">GTA</div>
            <div class="prop-stat-lbl">Toronto</div>
          </div>
        </div>
      </div>

      <!-- Footer brand -->
      <div class="prop-footer">
        <div class="prop-footer-left">
          <div class="prop-footer-hex"></div>
          <div>
            <div class="prop-footer-name">ELMNINI HOMES</div>
            <div class="prop-footer-sub">Hussein Elmnini · Real Estate Advisor</div>
          </div>
        </div>
        <div class="prop-footer-right">
          <div class="prop-footer-web">elmninihomes.ca</div>
          <div class="prop-footer-loc">Toronto, Canada</div>
        </div>
      </div>

    </div>
  </div>`;
}

/* ─────────────────────────────────────────────
   RENDER CARDS
───────────────────────────────────────────── */
const slideLabels = [
  'Cover — Market Spotlight',
  'Slide 2 — Scarborough Condo',
  'Slide 3 — Etobicoke Semi',
  'Slide 4 — North York Condo',
  'Slide 5 — East York Townhouse',
  'Slide 6 — Downtown Condo',
];

function buildCard(slideIdx, slideHTML, label) {
  const card = document.createElement('div');
  card.className = 'slide-card';
  card.dataset.idx = slideIdx;

  // Tag row
  const tag = document.createElement('div');
  tag.className = 'slide-number-tag';
  tag.innerHTML = `
    <div class="sn-badge">Slide ${slideIdx}</div>
    <div class="sn-label">${label.split('—')[1]?.trim() || ''}</div>`;

  // Preview
  const wrap = document.createElement('div');
  wrap.className = 'slide-preview-wrap';
  const inner = document.createElement('div');
  inner.className = 'slide-preview-inner';
  inner.innerHTML = slideHTML;
  wrap.appendChild(inner);

  // Footer
  const footer = document.createElement('div');
  footer.className = 'slide-footer';
  footer.innerHTML = `
    <div class="slide-footer-title">${label}</div>
    <button class="dl-btn" data-idx="${slideIdx}" title="Download PNG">
      <svg viewBox="0 0 24 24" fill="none" stroke="#071629" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    </button>`;

  card.appendChild(tag);
  card.appendChild(wrap);
  card.appendChild(footer);
  return card;
}

function init() {
  const grid = document.getElementById('slidesGrid');

  // Slide 1 — cover
  grid.appendChild(buildCard(1, buildCoverSlide(), slideLabels[0]));

  // Slides 2–6 — properties
  properties.forEach((prop, i) => {
    grid.appendChild(buildCard(prop.idx, buildPropSlide(prop), slideLabels[i+1]));
  });

  setTimeout(scaleSlides, 60);
}

function scaleSlides() {
  document.querySelectorAll('.slide-preview-wrap').forEach(wrap => {
    const w = wrap.offsetWidth;
    const scale = w / 1080;
    const design = wrap.querySelector('.slide-design');
    if (design) {
      design.style.transform = `scale(${scale})`;
      wrap.style.height = w + 'px';
    }
  });
}

window.addEventListener('resize', scaleSlides);

/* ─────────────────────────────────────────────
   DOWNLOAD LOGIC
───────────────────────────────────────────── */
function setOverlay(show, title='EXPORTING SLIDES…', sub='Please wait', pct=0) {
  const o = document.getElementById('overlay');
  o.classList.toggle('show', show);
  document.getElementById('overlayTitle').textContent = title;
  document.getElementById('overlaySub').textContent = sub;
  document.getElementById('overlayBar').style.width = pct + '%';
}

async function captureSlide(idx) {
  const design = document.getElementById(`slide-design-${idx}`);
  const orig = design.style.transform;
  design.style.transform = 'none';
  design.style.width  = '1080px';
  design.style.height = '1080px';

  // Wait for images to paint
  await new Promise(r => setTimeout(r, 300));

  const canvas = await html2canvas(design, {
    width: 1080, height: 1080,
    scale: 1, useCORS: true,
    allowTaint: true,
    backgroundColor: '#030d18',
    logging: false,
    imageTimeout: 8000
  });

  design.style.transform = orig;
  return canvas;
}

async function downloadSlide(idx) {
  setOverlay(true, `CAPTURING SLIDE ${idx}…`, 'Rendering design…', 30);
  try {
    const canvas = await captureSlide(idx);
    setOverlay(true, `SLIDE ${idx} READY`, 'Saving…', 90);
    const link = document.createElement('a');
    link.download = `elmnini-carousel-slide-${String(idx).padStart(2,'0')}.png`;
    link.href = canvas.toDataURL('image/png', 1.0);
    link.click();
  } catch(e) {
    console.error(e);
  }
  setOverlay(false);
}

async function downloadAllSlides() {
  const total = 6;
  for (let i = 1; i <= total; i++) {
    const pct = Math.round((i-1)/total*100);
    setOverlay(true, `EXPORTING SLIDE ${i} / ${total}`, `Processing…`, pct);
    await new Promise(r => setTimeout(r, 150));
    try {
      const canvas = await captureSlide(i);
      const link = document.createElement('a');
      link.download = `elmnini-carousel-slide-${String(i).padStart(2,'0')}.png`;
      link.href = canvas.toDataURL('image/png', 1.0);
      link.click();
      await new Promise(r => setTimeout(r, 700));
    } catch(e) { console.error(e); }
  }
  setOverlay(false);
}

async function downloadZip() {
  const zip = new JSZip();
  const folder = zip.folder('elmnini-carousel');
  const total = 6;

  for (let i = 1; i <= total; i++) {
    const pct = Math.round((i-1)/total*90);
    setOverlay(true, `BUILDING ZIP — SLIDE ${i} / ${total}`, `Rendering slide ${i}…`, pct);
    await new Promise(r => setTimeout(r, 150));
    try {
      const canvas = await captureSlide(i);
      const dataUrl = canvas.toDataURL('image/png', 1.0);
      const base64 = dataUrl.split(',')[1];
      folder.file(`slide-${String(i).padStart(2,'0')}.png`, base64, {base64:true});
      await new Promise(r => setTimeout(r, 300));
    } catch(e) { console.error(e); }
  }

  setOverlay(true, 'COMPRESSING ZIP…', 'Almost done…', 94);
  await new Promise(r => setTimeout(r, 200));

  const blob = await zip.generateAsync({type:'blob', compression:'DEFLATE', compressionOptions:{level:6}});
  setOverlay(true, 'DONE!', 'Saving ZIP file…', 100);
  await new Promise(r => setTimeout(r, 400));

  const link = document.createElement('a');
  link.download = 'elmnini-homes-carousel.zip';
  link.href = URL.createObjectURL(blob);
  link.click();
  setOverlay(false);
}

/* ─────────────────────────────────────────────
   EVENT LISTENERS
───────────────────────────────────────────── */
document.getElementById('btnAll').addEventListener('click', downloadAllSlides);
document.getElementById('btnZip').addEventListener('click', downloadZip);

document.addEventListener('click', e => {
  const btn = e.target.closest('.dl-btn');
  if (btn) {
    const idx = parseInt(btn.dataset.idx);
    downloadSlide(idx);
  }
});

/* ─────────────────────────────────────────────
   INIT
───────────────────────────────────────────── */
init();
</script>
</body>
</html>
